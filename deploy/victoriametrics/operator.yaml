apiVersion: v1
kind: Namespace
metadata:
  name: victoriametrics
  labels:
    app.kubernetes.io/name: victoriametrics
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vmclusters.operator.victoriametrics.com
  labels:
    app.kubernetes.io/name: victoriametrics-operator
spec:
  group: operator.victoriametrics.com
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                retentionPeriod:
                  type: string
                vmstorage:
                  type: object
                  properties:
                    replicaCount:
                      type: integer
                    resources:
                      type: object
                vmselect:
                  type: object
                  properties:
                    replicaCount:
                      type: integer
                    resources:
                      type: object
                vminsert:
                  type: object
                  properties:
                    replicaCount:
                      type: integer
                    resources:
                      type: object
  scope: Namespaced
  names:
    plural: vmclusters
    singular: vmcluster
    kind: VMCluster
    shortNames:
      - vmc
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vmsingles.operator.victoriametrics.com
  labels:
    app.kubernetes.io/name: victoriametrics-operator
spec:
  group: operator.victoriametrics.com
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
  scope: Namespaced
  names:
    plural: vmsingles
    singular: vmsingle
    kind: VMSingle
    shortNames:
      - vms
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: victoriametrics-operator
  namespace: victoriametrics
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: victoriametrics-operator
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "secrets", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["operator.victoriametrics.com"]
    resources: ["vmclusters", "vmsingles", "vmagents", "vmalerts", "vmrules", "vmauths"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["operator.victoriametrics.com"]
    resources: ["vmclusters/status", "vmsingles/status"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: victoriametrics-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: victoriametrics-operator
subjects:
  - kind: ServiceAccount
    name: victoriametrics-operator
    namespace: victoriametrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoriametrics-operator
  namespace: victoriametrics
  labels:
    app.kubernetes.io/name: victoriametrics-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: victoriametrics-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: victoriametrics-operator
    spec:
      serviceAccountName: victoriametrics-operator
      containers:
        - name: operator
          image: victoriametrics/operator:v0.42.0
          imagePullPolicy: IfNotPresent
          args:
            - --metrics-addr=:8080
            - --enable-leader-election
          ports:
            - name: metrics
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: WATCH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
