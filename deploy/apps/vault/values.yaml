# HashiCorp Vault Helm Chart Values
# Режим: HA с Raft storage backend

global:
  enabled: true

server:
  # Включаем серверную часть
  enabled: true
  
  # Количество реплик для HA режима
  replicas: 3
  
  # Используем Raft как бэкенд хранилища
  # Примечание: storage.raft.enabled=true только создаёт PVC,
  # поэтому используем server.extraVolumes для кастомной конфигурации
  storage:
    raft:
      enabled: true
      setNodeId: true
  
  # Дополнительная конфигурация через ConfigMap
  extraVolumes:
    - type: configMap
      name: vault-raft-config
      path: /vault/userconfig/raft-config.hcl
      args:
        name: raft-config
    - type: secret
      name: vault-tls-selfsigned
      path: /vault/userconfig/tls
      args:
        name: tls
  
  # Переопределяем конфигурацию через environment variable
  env:
    - name: VAULT_LOCAL_CONFIG
      value: |
        ui = true
        ui_url = "https://192.168.0.200/vault"
        listener "tcp" {
          tls_disable = 1
          address = "[::]:8200"
          cluster_address = "[::]:8201"
        }
        listener "tcp" {
          address = "[::]:8201"
          cluster_address = "[::]:8202"
          tls_cert_file = "/vault/userconfig/tls/tls.crt"
          tls_key_file = "/vault/userconfig/tls/tls.key"
        }
        storage "raft" {
          path = "/vault/data"
        }
        service_registration "kubernetes" {
          namespace = "vault"
        }
  
  # Конфигурация readiness probe
  readinessProbe:
    enabled: true
    path: "/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200"
    initialDelaySeconds: 30
    periodSeconds: 10

  # Конфигурация liveness probe
  livenessProbe:
    enabled: false
  
  # Ingress для доступа к Vault
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: nginx
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    hosts:
      - host: vault.techbit.su
        paths: []
    tls:
      - secretName: vault-tls-selfsigned
        hosts:
          - vault.techbit.su
  
  # Service для доступа к Vault
  service:
    enabled: true
    type: LoadBalancer
    port: 8200
    externalTrafficPolicy: Cluster
  
  # Persistent Volume для хранения данных Raft
  dataStorage:
    enabled: true
    size: 10Gi
    # storageClass: ""  # Используйте дефолтный storageClass или укажите свой
  
  # Resources для подов Vault
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  
  # Affinity для распределения подов по нодам
  affinity: ""
  # affinity: |
  #   podAntiAffinity:
  #     requiredDuringSchedulingIgnoredDuringExecution:
  #       - labelSelector:
  #           matchLabels:
  #             app.kubernetes.io/name: vault
  #             app.kubernetes.io/instance: vault
  #             component: server
  #         topologyKey: kubernetes.io/hostname
  
  # Tolerations для подов
  tolerations: []
  
  # Node Selector
  nodeSelector: {}
  
  # Extra environment variables
  extraEnvironmentVars:
    VAULT_LOG_LEVEL: "info"
  
  # Extra secrets
  extraSecrets: {}
  
  # Конфигурация авто-разблокировки (опционально)
  # autoUnseal:
  #   enabled: false
  #   kms:
  #     aws:
  #       enabled: false
  #       region: us-east-1
  #       kms_key_id: ""
  #       aws_access_key_id: ""
  #       aws_secret_access_key: ""

# UI для Vault
ui:
  enabled: true
  serviceType: ClusterIP
  servicePort: 8200
  externalPort: 8200

# Agent injector (для автоматического внедрения секретов)
injector:
  enabled: true
  replicas: 2
  resources:
    requests:
      memory: 256Mi
      cpu: 50m
    limits:
      memory: 512Mi
      cpu: 250m

# Конфигурация для CRD (Cert Manager и др.)
crds:
  enabled: true
