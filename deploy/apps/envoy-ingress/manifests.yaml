apiVersion: v1
kind: Namespace
metadata:
  name: envoy-ingress
  labels:
    app.kubernetes.io/name: envoy-ingress
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-ingress-config
  namespace: envoy-ingress
data:
  envoy.yaml: |
    node:
      id: envoy-ingress
      cluster: envoy-ingress-cluster
    
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901
    
    static_resources:
      listeners:
        - name: listener_http
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 8080
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    access_log:
                      - name: envoy.access_loggers.stdout
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                    http_filters:
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: go_app
                          domains: ["argocd-go-example.local", "*"]
                          routes:
                            - match:
                                path: "/"
                              redirect:
                                scheme_redirect: https
                                path_redirect: /health
                            - match:
                                prefix: "/"
                              route:
                                cluster: go_app_cluster
                        - name: vault
                          domains: ["vault.techbit.su"]
                          routes:
                            - match:
                                prefix: "/"
                              route:
                                cluster: vault_cluster
        
        - name: listener_https
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 8443
          filter_chains:
            - transport_socket:
                name: envoy.transport_sockets.tls
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
                  common_tls_context:
                    tls_certificates:
                      - certificate_chain:
                          filename: /etc/tls/tls.crt
                        private_key:
                          filename: /etc/tls/tls.key
              filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_https
                    access_log:
                      - name: envoy.access_loggers.stdout
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                    http_filters:
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                    route_config:
                      name: local_route_https
                      virtual_hosts:
                        - name: go_app_https
                          domains: ["argocd-go-example.local", "*"]
                          routes:
                            - match:
                                path: "/"
                              redirect:
                                path_redirect: "/health"
                            - match:
                                prefix: "/"
                              route:
                                cluster: go_app_cluster
                        - name: vault_https
                          domains: ["vault.techbit.su"]
                          routes:
                            - match:
                                prefix: "/"
                              route:
                                cluster: vault_cluster
      
      clusters:
        - name: go_app_cluster
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: go_app_cluster
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: argocd-go-example.argocd-go-example.svc.cluster.local
                          port_value: 80
          connect_timeout: 5s
        
        - name: vault_cluster
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: vault_cluster
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: vault.vault.svc.cluster.local
                          port_value: 8200
          connect_timeout: 5s
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy-ingress
  namespace: envoy-ingress
  labels:
    app.kubernetes.io/name: envoy-ingress
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: envoy-ingress
  template:
    metadata:
      labels:
        app.kubernetes.io/name: envoy-ingress
    spec:
      containers:
        - name: envoy
          image: envoyproxy/envoy:v1.29-latest
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9901
              name: admin
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
              readOnly: true
            - name: tls-certs
              mountPath: /etc/tls
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /server_info
              port: 9901
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /server_info
              port: 9901
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: envoy-config
          configMap:
            name: envoy-ingress-config
            items:
              - key: envoy.yaml
                path: envoy.yaml
        - name: tls-certs
          secret:
            secretName: argocd-go-example-tls
            items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
---
apiVersion: v1
kind: Service
metadata:
  name: envoy-ingress
  namespace: envoy-ingress
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
    - port: 443
      targetPort: 8443
      protocol: TCP
      name: https
  selector:
    app.kubernetes.io/name: envoy-ingress
