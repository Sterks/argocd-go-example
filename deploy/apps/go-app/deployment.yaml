apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-go-example
  namespace: argocd-go-example
  labels:
    app: argocd-go-example
spec:
  replicas: 2
  selector:
    matchLabels:
      app: argocd-go-example
  template:
    metadata:
      labels:
        app: argocd-go-example
      annotations:
        # Vault Agent Injector annotations
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-inject-secret: "config.env"
        vault.hashicorp.com/agent-pre-populate-only: "true"
        vault.hashicorp.com/role: "go-app-role"
    spec:
      serviceAccountName: vault-auth
      containers:
        - name: app
          image: 192.168.0.101:30500/argocd-go-example:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: vault-go-app-config
                  key: DB_HOST
                  optional: true
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: vault-go-app-config
                  key: DB_PORT
                  optional: true
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: vault-go-app-config
                  key: DB_NAME
                  optional: true
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: vault-go-app-config
                  key: DB_USER
                  optional: true
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vault-go-app-config
                  key: DB_PASSWORD
                  optional: true
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: vault-go-app-config
                  key: API_KEY
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
