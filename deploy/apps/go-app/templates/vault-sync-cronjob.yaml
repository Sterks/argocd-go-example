apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-secret-sync
  namespace: argocd-go-example
  labels:
    app: vault-secret-sync
spec:
  # Синхронизация каждые 5 минут
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: vault-secret-sync
        spec:
          serviceAccountName: vault-auth
          restartPolicy: OnFailure
          containers:
            - name: vault-sync
              image: hashicorp/vault:1.21.2
              command:
                - /bin/sh
                - -c
                - |
                  # Чтение секрета из Vault
                  SECRET=$(vault kv get -format=json kv/go-app/config)
                  
                  if [ $? -ne 0 ]; then
                    echo "❌ Ошибка чтения секрета из Vault"
                    exit 1
                  fi
                  
                  # Создание/обновление Kubernetes Secret
                  kubectl create secret generic vault-go-app-config \
                    --from-literal=DB_HOST="$(echo $SECRET | jq -r '.data.DB_HOST')" \
                    --from-literal=DB_PORT="$(echo $SECRET | jq -r '.data.DB_PORT')" \
                    --from-literal=DB_NAME="$(echo $SECRET | jq -r '.data.DB_NAME')" \
                    --from-literal=DB_USER="$(echo $SECRET | jq -r '.data.DB_USER')" \
                    --from-literal=DB_PASSWORD="$(echo $SECRET | jq -r '.data.DB_PASSWORD')" \
                    --from-literal=API_KEY="$(echo $SECRET | jq -r '.data.API_KEY')" \
                    --namespace=argocd-go-example \
                    --dry-run=client -o yaml | kubectl apply -f -
                  
                  echo "✅ Секреты синхронизированы"
              env:
                - name: VAULT_ADDR
                  value: "https://192.168.0.200/vault"
                - name: VAULT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: vault-root-token
                      key: token
                      optional: true
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 1000
