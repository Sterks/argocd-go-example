---
# -----------------------------------------------------------------------------
# Pritunl Route (VPN Server)
# -----------------------------------------------------------------------------
# URL: https://vpn.techbit.su/
# Backend: Pritunl Service (порт 80 HTTP)
# Namespace: pritunl
# Примечание: TLS termination на Gateway, backend получает HTTP
# -----------------------------------------------------------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pritunl-route
  namespace: pritunl
spec:
  parentRefs:
    - name: main-gateway
      namespace: default
      sectionName: https
      port: 443
  hostnames:
    - vpn.techbit.su
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: pritunl
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pritunl-http-route
  namespace: pritunl
spec:
  parentRefs:
    - name: main-gateway
      namespace: default
      sectionName: http
      port: 80
  hostnames:
    - vpn.techbit.su
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: pritunl
          port: 80
