# =============================================================================
# Envoy Gateway HTTP Routes
# =============================================================================
# Маршруты для доступа к сервисам через Envoy Gateway
#
# Доступные эндпоинты (поддомены):
#   - https://argocd.techbit.su/     → ArgoCD
#   - https://grafana.techbit.su/    → Grafana
#   - https://longhorn.techbit.su/   → Longhorn
#   - https://vault.techbit.su/      → Vault UI
#   - https://techbit.su/            → Go App (главная)
#
# =============================================================================

# -----------------------------------------------------------------------------
# Grafana Route
# -----------------------------------------------------------------------------
# URL: https://grafana.techbit.su/
# Backend: Grafana Service (порт 3000)
# Namespace: victoriametrics
# -----------------------------------------------------------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: victoriametrics
spec:
  parentRefs:
    - name: main-gateway
      namespace: default
      sectionName: http
      port: 80
    - name: main-gateway
      namespace: default
      sectionName: https
      port: 443
  hostnames:
    - grafana.techbit.su
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: vm-stack-2-grafana
          port: 80
---
# -----------------------------------------------------------------------------
# ArgoCD Route
# -----------------------------------------------------------------------------
# URL: https://argocd.techbit.su/argocd/
# Backend: ArgoCD Server (порт 80)
# Namespace: argocd
# Примечание: ArgoCD настроен с --rootpath=/argocd, поэтому путь должен быть /argocd
# -----------------------------------------------------------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-route
  namespace: argocd
spec:
  parentRefs:
    - name: main-gateway
      namespace: default
      sectionName: http
      port: 80
    - name: main-gateway
      namespace: default
      sectionName: https
      port: 443
  hostnames:
    - argocd.techbit.su
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /argocd
      backendRefs:
        - name: argocd-server
          port: 80
---
# -----------------------------------------------------------------------------
# Longhorn Route
# -----------------------------------------------------------------------------
# URL: https://longhorn.techbit.su/
# Backend: Longhorn Frontend (порт 80)
# Namespace: longhorn-system
# -----------------------------------------------------------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn-route
  namespace: longhorn-system
spec:
  parentRefs:
    - name: main-gateway
      namespace: default
      sectionName: http
      port: 80
    - name: main-gateway
      namespace: default
      sectionName: https
      port: 443
  hostnames:
    - longhorn.techbit.su
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: longhorn-frontend
          port: 80
---
# -----------------------------------------------------------------------------
# Vault Route
# -----------------------------------------------------------------------------
# URL: https://vault.techbit.su/
# Backend: Vault UI (порт 8200)
# Namespace: vault
# Примечание: Маршрут обрабатывает все пути для работы UI
# -----------------------------------------------------------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vault-route
  namespace: vault
spec:
  parentRefs:
    - name: main-gateway
      namespace: default
      sectionName: http
      port: 80
    - name: main-gateway
      namespace: default
      sectionName: https
      port: 443
  hostnames:
    - vault.techbit.su
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: vault-ui
          port: 8200
---
# -----------------------------------------------------------------------------
# Go App Route (Главная страница)
# -----------------------------------------------------------------------------
# URL: https://techbit.su/
# Backend: Go App Service (порт 8080)
# Namespace: argocd-go-example
# -----------------------------------------------------------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-route
  namespace: argocd-go-example
spec:
  parentRefs:
    - name: main-gateway
      namespace: default
      sectionName: http
      port: 80
    - name: main-gateway
      namespace: default
      sectionName: https
      port: 443
  hostnames:
    - techbit.su
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: go-app-service
          port: 8080
---
# -----------------------------------------------------------------------------
# Pritunl Route (VPN Server)
# -----------------------------------------------------------------------------
# URL: https://vpn.techbit.su/
# Backend: Pritunl Service (порт 80 HTTP)
# Namespace: pritunl
# Примечание: TLS termination на Gateway, backend получает HTTP
# -----------------------------------------------------------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pritunl-route
  namespace: pritunl
spec:
  parentRefs:
    - name: main-gateway
      namespace: default
      sectionName: https
      port: 443
  hostnames:
    - vpn.techbit.su
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: pritunl
          port: 80
