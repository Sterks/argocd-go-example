# =============================================================================
# Envoy Gateway HTTP Routes
# =============================================================================
# Маршруты для доступа к сервисам через Envoy Gateway
# 
# Доступные эндпоинты:
#   - https://techbit.su/argocd/     → ArgoCD
#   - https://techbit.su/grafana/    → Grafana
#   - https://techbit.su/longhorn/   → Longhorn
#   - https://techbit.su/vault/ui/   → Vault UI
#   - https://techbit.su/            → Go App (главная)
#
# =============================================================================

# -----------------------------------------------------------------------------
# Grafana Route
# -----------------------------------------------------------------------------
# URL: https://techbit.su/grafana/
# Перенаправление: /grafana/* → Grafana Service (порт 3000)
# Namespace: victoriametrics
# -----------------------------------------------------------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: victoriametrics
spec:
  parentRefs:
    - name: main-gateway
      namespace: default
      sectionName: http
      port: 80
    - name: main-gateway
      namespace: default
      sectionName: https
      port: 443
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /grafana
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: vm-stack-2-grafana
          port: 80
---
# -----------------------------------------------------------------------------
# ArgoCD Route
# -----------------------------------------------------------------------------
# URL: https://techbit.su/argocd/
# Перенаправление: /argocd/* → ArgoCD Server (порт 80)
# Namespace: argocd
# Примечание: ArgoCD требует настройки base href для работы с подпутём
# -----------------------------------------------------------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-route
  namespace: argocd
spec:
  parentRefs:
    - name: main-gateway
      namespace: default
      sectionName: http
      port: 80
    - name: main-gateway
      namespace: default
      sectionName: https
      port: 443
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /argocd
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: argocd-server
          port: 80
---
# -----------------------------------------------------------------------------
# Longhorn Route
# -----------------------------------------------------------------------------
# URL: https://techbit.su/longhorn/
# Перенаправление: /longhorn/* → Longhorn Frontend (порт 80)
# Namespace: longhorn-system
# -----------------------------------------------------------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn-route
  namespace: longhorn-system
spec:
  parentRefs:
    - name: main-gateway
      namespace: default
      sectionName: http
      port: 80
    - name: main-gateway
      namespace: default
      sectionName: https
      port: 443
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /longhorn
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: longhorn-frontend
          port: 80
---
# -----------------------------------------------------------------------------
# Vault Route
# -----------------------------------------------------------------------------
# URL: https://techbit.su/vault/ui/
# Перенаправление: 
#   - /vault/* → Vault UI (порт 8200)
#   - /ui/* → Vault UI статика (CSS, JS)
#   - /v1/* → Vault API (для работы UI)
# Namespace: vault
# -----------------------------------------------------------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vault-route
  namespace: vault
spec:
  parentRefs:
    - name: main-gateway
      namespace: default
      sectionName: http
      port: 80
    - name: main-gateway
      namespace: default
      sectionName: https
      port: 443
  rules:
    # /vault → Vault UI с URL Rewrite
    - matches:
        - path:
            type: PathPrefix
            value: /vault
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: vault-ui
          port: 8200
    # /ui/* → Vault UI (для статических ресурсов)
    - matches:
        - path:
            type: PathPrefix
            value: /ui
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /ui
      backendRefs:
        - name: vault-ui
          port: 8200
    # /v1/* → Vault API (для работы UI)
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /v1
      backendRefs:
        - name: vault-ui
          port: 8200
---
# -----------------------------------------------------------------------------
# Go App Route (Главная страница)
# -----------------------------------------------------------------------------
# URL: https://techbit.su/
# Перенаправление: /* → Go App Service (порт 8080)
# Namespace: argocd-go-example
# -----------------------------------------------------------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-route
  namespace: argocd-go-example
spec:
  parentRefs:
    - name: main-gateway
      namespace: default
      sectionName: http
      port: 80
    - name: main-gateway
      namespace: default
      sectionName: https
      port: 443
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: go-app-service
          port: 8080
