    - vault.techbit.su
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: vault-ui
          port: 8200
---
# -----------------------------------------------------------------------------
# Go App Route (Главная страница)
# -----------------------------------------------------------------------------
# URL: https://techbit.su/
