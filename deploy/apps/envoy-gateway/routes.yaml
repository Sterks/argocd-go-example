apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: victoriametrics
spec:
  parentRefs:
    - name: main-gateway
      namespace: default
      sectionName: http
      port: 80
    - name: main-gateway
      namespace: default
      sectionName: https
      port: 443
  hostnames:
    - grafana.techbit.su
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: vm-stack-2-grafana
          port: 80
---
