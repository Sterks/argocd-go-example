apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn-route
  namespace: longhorn-system
spec:
  parentRefs:
    - name: main-gateway
      namespace: default
      sectionName: http
      port: 80
    - name: main-gateway
      namespace: default
      sectionName: https
      port: 443
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /longhorn
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: longhorn-frontend
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vault-route
  namespace: vault
spec:
  parentRefs:
    - name: main-gateway
      namespace: default
      sectionName: http
      port: 80
    - name: main-gateway
      namespace: default
      sectionName: https
      port: 443
  rules:
    # /vault → Vault UI с URL Rewrite
    - matches:
        - path:
            type: PathPrefix
            value: /vault
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: vault-ui
          port: 8200
    # /ui/* → Vault UI (для статических ресурсов)
    - matches:
        - path:
            type: PathPrefix
            value: /ui
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /ui
      backendRefs:
        - name: vault-ui
          port: 8200
    # /v1/* → Vault API (для работы UI)
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /v1
      backendRefs:
        - name: vault-ui
          port: 8200
---
