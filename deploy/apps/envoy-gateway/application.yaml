# Синхронизирует Gateway, Certificate, HTTPRoute и ConfigMap Longhorn.
# Не входит в kustomize infrastructure/argocd — примените один раз:
#   kubectl apply -f deploy/apps/envoy-gateway/application.yaml
#
# Требуется: установленный Envoy Gateway, cert-manager, ClusterIssuer selfsigned-cluster-issuer.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway-config
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Sterks/argocd-go-example.git
    targetRevision: HEAD
    path: deploy/apps/envoy-gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PrunePropagationPolicy=foreground
      - PruneLast=true
