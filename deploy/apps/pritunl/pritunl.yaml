# Pritunl VPN Server Deployment
# =============================================================================
# Pritunl - OpenVPN-based VPN server for secure access to Kubernetes cluster
# 
# После установки:
# 1. Получите ключ установки: kubectl logs -n pritunl -l app=pritunl | grep "key:"
# 2. Откройте https://192.168.0.200/pritunl и введите ключ
# 3. Настройте пользователей и подключения
# =============================================================================

---
# MongoDB для Pritunl
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-data
  namespace: pritunl
  labels:
    app: mongodb
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: pritunl
  labels:
    app: mongodb
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:4.4
          ports:
            - containerPort: 27017
              name: mongodb
          volumeMounts:
            - name: data
              mountPath: /data/db
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: pritunl
  labels:
    app: mongodb
spec:
  ports:
    - port: 27017
      targetPort: 27017
      name: mongodb
  clusterIP: None
  selector:
    app: mongodb
---
# Pritunl Server
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pritunl-data
  namespace: pritunl
  labels:
    app: pritunl
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pritunl
  namespace: pritunl
  labels:
    app: pritunl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pritunl
  template:
    metadata:
      labels:
        app: pritunl
    spec:
      containers:
        - name: pritunl
          image: docker.io/jippi/pritunl:1.32.4567.52
          ports:
            - containerPort: 1194
              protocol: UDP
              name: openvpn
            - containerPort: 80
              name: http
            - containerPort: 443
              name: https
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Moscow"
            - name: PRITUNL_MONGODB_URI
              value: "mongodb://mongodb:27017/pritunl"
            - name: PRITUNL_REVERSE_PROXY
              value: "true"
            - name: PRITUNL_APP_URL
              value: "http://pritunl.pritunl.svc.cluster.local"
          livenessProbe:
            httpGet:
              scheme: HTTP
              path: /health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              scheme: HTTP
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/pritunl
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - SYS_MODULE
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pritunl-data
---
apiVersion: v1
kind: Service
metadata:
  name: pritunl
  namespace: pritunl
  labels:
    app: pritunl
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: http
    - port: 443
      targetPort: 443
      name: https
    - port: 1194
      targetPort: 1194
      protocol: UDP
      name: openvpn
  selector:
    app: pritunl
---
# Service для OpenVPN (LoadBalancer)
apiVersion: v1
kind: Service
metadata:
  name: pritunl-vpn
  namespace: pritunl
  labels:
    app: pritunl
spec:
  type: LoadBalancer
  ports:
    - port: 1194
      targetPort: 1194
      protocol: UDP
      name: openvpn
  selector:
    app: pritunl
