apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: victoriametrics
  labels:
    app.kubernetes.io/name: grafana
  annotations:
    envoy.ingress.kubernetes.io/whitelist: |
      192.168.0.0/24
      10.42.0.0/16
    envoy.ingress.kubernetes.io/rate-limit: "100"
    envoy.ingress.kubernetes.io/timeout: "30s"
spec:
  ingressClassName: envoy
  rules:
    - host: 192.168.0.200
      http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
