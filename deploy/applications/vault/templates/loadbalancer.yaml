# LoadBalancer сервис для прямого доступа к Vault UI
{{- if .Values.loadBalancer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: vault-lb
  namespace: vault
  labels:
    app: vault
    app.kubernetes.io/name: vault
    app.kubernetes.io/instance: vault
spec:
  type: LoadBalancer
  externalTrafficPolicy: {{ .Values.loadBalancer.externalTrafficPolicy | default "Local" }}
  ports:
    - name: http
      port: {{ .Values.loadBalancer.ports.http | default 80 }}
      targetPort: {{ .Values.loadBalancer.targetPort | default 8200 }}
      protocol: TCP
    - name: https
      port: {{ .Values.loadBalancer.ports.https | default 443 }}
      targetPort: {{ .Values.loadBalancer.targetPort | default 8200 }}
      protocol: TCP
  selector:
    app.kubernetes.io/name: vault
    app.kubernetes.io/instance: vault
    component: server
{{- end }}
