{{- if .Values.grafana.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-traefik-ingress
  namespace: victoriametrics
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: vm-stack-2
  {{- with .Values.grafana.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.grafana.ingress.className }}
  rules:
    - host: {{ .Values.grafana.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.grafana.ingress.service.name }}
                port:
                  number: {{ .Values.grafana.ingress.service.port }}
{{- end }}
