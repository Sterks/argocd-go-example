apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: longhorn-ingress
  namespace: longhorn-system
  labels:
    app: longhorn
  annotations:
    # Whitelist IP адресов - только внутренняя сеть
    envoy.ingress.kubernetes.io/whitelist: |
      192.168.0.0/24
      10.42.0.0/16
    # Rate limiting (запросов в секунду на IP)
    envoy.ingress.kubernetes.io/rate-limit: "100"
    # Timeout
    envoy.ingress.kubernetes.io/timeout: "30s"
    # URL Rewrite для path-based доступа
    envoy.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: envoy
  rules:
    # Path-based access: https://192.168.0.200/longhorn
    - http:
        paths:
          - path: /longhorn
            pathType: Prefix
            backend:
              service:
                name: longhorn-frontend
                port:
                  number: 80
