# PostgreSQL cluster Helm values
# Chart: postgres-operator-charts/postgres-cluster

global:
  installation:
    targetNamespace: postgresql

configUsers:
  appuser:
    - superuser
    - createdb

databases:
  appdb: appuser

numberOfInstances: 1

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

volume:
  size: 100Gi
  storageClass: longhorn

postgresql:
  version: "16"
  parameters:
    max_connections: "200"
    shared_buffers: "256MB"

patroni:
  sync_mode: false
  synchronous_node_count: 1
  failsafe_mode: false

enableLogicalReplication: false

tls:
  secretName: ""

usersWithSecretRotation: []

additionalVolumes: []
