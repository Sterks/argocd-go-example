---
apiVersion: v1
kind: Namespace
metadata:
  name: postgresql
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-superuser
  namespace: postgresql
type: kubernetes.io/basic-auth
stringData:
  username: postgres
  password: "PostgresSuper123!"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-appuser
  namespace: postgresql
type: kubernetes.io/basic-auth
stringData:
  username: appuser
  password: "AppUser123!"
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: my-postgres
  namespace: postgresql
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  storage:
    size: 10Gi
    storageClass: longhorn
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  enableSuperuserAccess: true
  superuserSecret:
    name: postgres-superuser
  bootstrap:
    initdb:
      database: appdb
      owner: appuser
      secret:
        name: postgres-appuser
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-read
  namespace: postgresql
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    cnpg.io/cluster: my-postgres
    role: primary
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-all
  namespace: postgresql
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    cnpg.io/cluster: my-postgres
