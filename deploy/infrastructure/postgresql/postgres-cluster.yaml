---
# PostgreSQL cluster
# Секреты создаются Zalando operator в Kubernetes
# Для синхронизации в Vault используйте ручной скрипт или External Secrets Operator
apiVersion: "acid.zalan.do/v1"
kind: postgresql
metadata:
  name: my-postgres-cluster
  namespace: postgresql
  labels:
    app.kubernetes.io/instance: my-postgres-cluster
  annotations:
    # Аннотация для обозначения что секреты должны быть в Vault
    postgresql.acid.zalan.do/vault-sync: "enabled"
spec:
  teamId: "myteam"
  numberOfInstances: 1
  users:
    appuser:
    - superuser
    - createdb
  databases:
    appdb: appuser
  postgresql:
    version: "16"
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  volume:
    size: 100Gi
    storageClass: longhorn
  patroni:
    sync_mode: false
    synchronous_node_count: 1
    failsafe_mode: false
  usersWithSecretRotation: []
  tls:
    secretName: ""
  additionalVolumes: []
---
# ConfigMap со скриптом для ручной синхронизации секретов в Vault
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-vault-sync
  namespace: postgresql
data:
  README.md: |
    # Синхронизация PostgreSQL секретов в Vault
    
    ## Предварительные требования
    1. Vault должен быть запущен и доступен
    2. Vault token должен иметь права на запись в secret/postgres/*
    
    ## Синхронизация
    
    ### Способ 1: Через kubectl exec
    ```bash
    # Получить Vault root token
    VAULT_TOKEN=$(kubectl get secret vault-root-token -n vault -o jsonpath='{.data.token}' | base64 -d 2>/dev/null || echo "YOUR_VAULT_TOKEN")
    
    # Синхронизировать секреты
    kubectl exec -it vault-0 -n vault -- sh -c '
      VAULT_ADDR="http://localhost:8200"
      
      # Получить секреты из Kubernetes
      APPUSER_PASSWORD=$(kubectl get secret appuser.my-postgres-cluster.credentials.postgresql.acid.zalan.do -n postgresql -o jsonpath="{.data.password}" | base64 -d)
      POSTGRES_PASSWORD=$(kubectl get secret postgres.my-postgres-cluster.credentials.postgresql.acid.zalan.do -n postgresql -o jsonpath="{.data.password}" | base64 -d)
      
      # Записать в Vault
      vault kv put secret/postgres/my-postgres-cluster/appuser password="$APPUSER_PASSWORD" username="appuser"
      vault kv put secret/postgres/my-postgres-cluster/postgres password="$POSTGRES_PASSWORD" username="postgres"
      
      echo "Secrets synced!"
    '
    ```
    
    ### Способ 2: Через Vault CLI локально
    ```bash
    export VAULT_ADDR="http://<vault-address>:8200"
    export VAULT_TOKEN="<your-vault-token>"
    
    # Получить пароли из Kubernetes
    APPUSER_PASSWORD=$(kubectl get secret appuser.my-postgres-cluster.credentials.postgresql.acid.zalan.do -n postgresql -o jsonpath="{.data.password}" | base64 -d)
    POSTGRES_PASSWORD=$(kubectl get secret postgres.my-postgres-cluster.credentials.postgresql.acid.zalan.do -n postgresql -o jsonpath="{.data.password}" | base64 -d)
    
    # Записать в Vault
    vault kv put secret/postgres/my-postgres-cluster/appuser password="$APPUSER_PASSWORD" username="appuser"
    vault kv put secret/postgres/my-postgres-cluster/postgres password="$POSTGRES_PASSWORD" username="postgres"
    ```
    
    ## Проверка
    ```bash
    # Читать из Vault
    vault kv get secret/postgres/my-postgres-cluster/appuser
    vault kv get secret/postgres/my-postgres-cluster/postgres
    ```
    
    ## Путь к секретам в Vault
    - `secret/postgres/my-postgres-cluster/appuser` - credentials для appuser
    - `secret/postgres/my-postgres-cluster/postgres` - credentials для postgres superuser
