---
# PostgreSQL cluster
# Секреты создаются Zalando operator и могут быть синхронизированы в Vault вручную или через скрипт
apiVersion: "acid.zalan.do/v1"
kind: postgresql
metadata:
  name: my-postgres-cluster
  namespace: postgresql
  labels:
    app.kubernetes.io/instance: my-postgres-cluster
  annotations:
    # Аннотация для обозначения что секреты должны быть в Vault
    postgresql.acid.zalan.do/vault-sync: "true"
spec:
  teamId: "myteam"
  numberOfInstances: 1
  users:
    appuser:
    - superuser
    - createdb
  databases:
    appdb: appuser
  postgresql:
    version: "16"
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  volume:
    size: 100Gi
    storageClass: longhorn
  patroni:
    sync_mode: false
    synchronous_node_count: 1
    failsafe_mode: false
  usersWithSecretRotation: []
  tls:
    secretName: ""
  additionalVolumes: []
---
# ConfigMap со скриптом синхронизации секретов в Vault
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-vault-sync
  namespace: postgresql
data:
  sync-to-vault.sh: |
    #!/bin/bash
    set -e
    
    VAULT_ADDR="${VAULT_ADDR:-http://vault.vault.svc.cluster.local:8200}"
    VAULT_TOKEN="${VAULT_TOKEN:-}"
    CLUSTER_NAME="${1:-my-postgres-cluster}"
    NAMESPACE="${2:-postgresql}"
    
    echo "Syncing PostgreSQL secrets to Vault..."
    echo "Vault Address: $VAULT_ADDR"
    echo "Cluster: $CLUSTER_NAME"
    
    # Проверка доступности Vault
    if ! vault status -address="$VAULT_ADDR" >/dev/null 2>&1; then
      echo "ERROR: Vault is not accessible at $VAULT_ADDR"
      exit 1
    fi
    
    # Получение секретов из Kubernetes
    echo "Reading secrets from Kubernetes..."
    APPUSER_USERNAME=$(kubectl get secret appuser.${CLUSTER_NAME}.credentials.postgresql.acid.zalan.do -n ${NAMESPACE} -o jsonpath='{.data.username}' 2>/dev/null | base64 -d || echo "")
    APPUSER_PASSWORD=$(kubectl get secret appuser.${CLUSTER_NAME}.credentials.postgresql.acid.zalan.do -n ${NAMESPACE} -o jsonpath='{.data.password}' 2>/dev/null | base64 -d || echo "")
    POSTGRES_USERNAME=$(kubectl get secret postgres.${CLUSTER_NAME}.credentials.postgresql.acid.zalan.do -n ${NAMESPACE} -o jsonpath='{.data.username}' 2>/dev/null | base64 -d || echo "")
    POSTGRES_PASSWORD=$(kubectl get secret postgres.${CLUSTER_NAME}.credentials.postgresql.acid.zalan.do -n ${NAMESPACE} -o jsonpath='{.data.password}' 2>/dev/null | base64 -d || echo "")
    
    if [ -z "$APPUSER_PASSWORD" ] || [ -z "$POSTGRES_PASSWORD" ]; then
      echo "ERROR: Could not read secrets from Kubernetes"
      exit 1
    fi
    
    # Запись в Vault
    echo "Writing appuser credentials to Vault..."
    vault kv put -address="$VAULT_ADDR" -token="$VAULT_TOKEN" \
      "secret/postgres/${CLUSTER_NAME}/appuser" \
      username="$APPUSER_USERNAME" \
      password="$APPUSER_PASSWORD"
    
    echo "Writing postgres credentials to Vault..."
    vault kv put -address="$VAULT_ADDR" -token="$VAULT_TOKEN" \
      "secret/postgres/${CLUSTER_NAME}/postgres" \
      username="$POSTGRES_USERNAME" \
      password="$POSTGRES_PASSWORD"
    
    echo "✓ Secrets successfully synced to Vault!"
    echo "  - secret/postgres/${CLUSTER_NAME}/appuser"
    echo "  - secret/postgres/${CLUSTER_NAME}/postgres"
---
# Job для однократной синхронизации секретов
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-vault-sync-initial
  namespace: postgresql
  labels:
    app: postgres-vault-sync
spec:
  template:
    spec:
      serviceAccountName: vault-sync-sa
      containers:
        - name: vault-sync
          image: hashicorp/vault:latest
          command: ["/bin/bash", "/scripts/sync-to-vault.sh"]
          args: ["my-postgres-cluster", "postgresql"]
          env:
            - name: VAULT_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: postgres-vault-sync
            defaultMode: 0755
      restartPolicy: OnFailure
  backoffLimit: 3
---
# ServiceAccount для синхронизации секретов
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-sync-sa
  namespace: postgresql
---
# Role для доступа к секретам PostgreSQL
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-sync-secrets
  namespace: postgresql
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - "appuser.my-postgres-cluster.credentials.postgresql.acid.zalan.do"
      - "postgres.my-postgres-cluster.credentials.postgresql.acid.zalan.do"
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-sync-secrets
  namespace: postgresql
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-sync-secrets
subjects:
  - kind: ServiceAccount
    name: vault-sync-sa
    namespace: postgresql
---
# Инструкция по использованию
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-vault-readme
  namespace: postgresql
data:
  README.md: |
    # PostgreSQL Secrets в Vault
    
    ## Синхронизация секретов
    
    ### Автоматическая синхронизация (при создании кластера)
    Job `postgres-vault-sync-initial` автоматически синхронизирует секреты при создании.
    
    ### Ручная синхронизация
    ```bash
    # Получить Vault token
    VAULT_TOKEN=$(kubectl get secret vault-root-token -n vault -o jsonpath='{.data.token}' | base64 -d)
    
    # Запустить синхронизацию
    kubectl create job --from=cronjob/postgres-vault-sync postgres-vault-sync-manual -n postgresql
    
    # Или выполнить скрипт напрямую
    kubectl run vault-sync --image=hashicorp/vault:latest --rm -it --restart=Never \
      --env="VAULT_ADDR=http://vault.vault.svc.cluster.local:8200" \
      --env="VAULT_TOKEN=$VAULT_TOKEN" \
      -- /bin/bash -c '
        APPUSER_PASSWORD=$(kubectl get secret appuser.my-postgres-cluster.credentials.postgresql.acid.zalan.do -n postgresql -o jsonpath="{.data.password}" | base64 -d)
        vault kv put secret/postgres/my-postgres-cluster/appuser password="$APPUSER_PASSWORD" username="appuser"
      '
    ```
    
    ## Чтение секретов из Vault
    
    ```bash
    # Через Vault CLI
    vault kv get secret/postgres/my-postgres-cluster/appuser
    
    # Через kubectl
    kubectl exec -it vault-0 -n vault -- vault kv get secret/postgres/my-postgres-cluster/appuser
    ```
    
    ## Путь к секретам в Vault
    - `secret/postgres/my-postgres-cluster/appuser` - credentials для appuser
    - `secret/postgres/my-postgres-cluster/postgres` - credentials для postgres superuser
