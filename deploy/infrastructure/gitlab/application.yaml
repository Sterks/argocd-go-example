apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitlab
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://charts.gitlab.io/
      chart: gitlab
      targetRevision: 8.4.1
      helm:
        releaseName: gitlab
        valueFiles:
          - $values/deploy/infrastructure/gitlab/values.yaml
        parameters:
          - name: certmanager.install
            value: "false"
          - name: global.ingress.configureCertmanager
            value: "false"
    - repoURL: https://github.com/Sterks/argocd-go-example.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: gitlab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ServerSideApply=true
