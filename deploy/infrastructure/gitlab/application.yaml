apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitlab
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.gitlab.io/
    chart: gitlab
    targetRevision: 7.0.0
    helm:
      releaseName: gitlab
      values: |
        global:
          edition: ce
          hosts:
            domain: techbit.su
            https: true
            gitlab:
              name: gitlab.techbit.su
          ingress:
            configureCertmanager: false
            class: traefik
            tls:
              enabled: true
              secretName: gitlab-tls-selfsigned
          certmanager-issuer:
            email: admin@techbit.su
          gitlab:
            upgradeCheck:
              enabled: false
        gitlab:
          upgradeCheck:
            enabled: false
        pages:
          enabled: false
        gitlab-runner:
          install: false
        registry:
          enabled: true
          storage:
            secret: gitlab-registry-storage
            key: config
          persistence:
            enabled: true
            size: 10Gi
            storageClass: longhorn
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        postgresql:
          enabled: true
          persistence:
            enabled: true
            size: 20Gi
            storageClass: longhorn
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          shmVolume:
            enabled: true
        redis:
          install: true
          persistence:
            enabled: true
            size: 5Gi
            storageClass: longhorn
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        gitaly:
          persistence:
            enabled: true
            size: 30Gi
            storageClass: longhorn
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
        webservice:
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: 1000m
              memory: 1.5Gi
        sidekiq:
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: 1000m
              memory: 1.5Gi
        toolbox:
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        certmanager:
          install: false
        certificate:
          enabled: false
        gitlab:
          initialRootPassword:
            secret: gitlab-initial-password
            key: password
  destination:
    server: https://kubernetes.default.svc
    namespace: gitlab
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ServerSideApply=true
      - SkipSchemaValidation=true
      - SkipHelmHooks=true
