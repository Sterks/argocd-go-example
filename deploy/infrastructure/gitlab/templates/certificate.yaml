# TLS Certificate for GitLab via cert-manager
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: gitlab-tls
  namespace: gitlab
spec:
  secretName: gitlab-tls-letsencrypt
  duration: 2160h  # 90 days
  renewBefore: 360h  # 15 days before expiry
  commonName: gitlab.techbit.su
  dnsNames:
    - gitlab.techbit.su
  issuerRef:
    name: selfsigned-cluster-issuer
    kind: ClusterIssuer
---
# TLS Certificate for GitLab Registry
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: gitlab-registry-tls
  namespace: gitlab
spec:
  secretName: gitlab-registry-tls-letsencrypt
  duration: 2160h
  renewBefore: 360h
  commonName: registry.gitlab.techbit.su
  dnsNames:
    - registry.gitlab.techbit.su
  issuerRef:
    name: selfsigned-cluster-issuer
    kind: ClusterIssuer
