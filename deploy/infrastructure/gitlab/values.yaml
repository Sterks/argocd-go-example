# GitLab Helm Chart Values v8.4.1
# Optimized for resource-constrained environment

global:
  edition: ce
  
  # Host configuration
  hosts:
    domain: techbit.su
    gitlab: gitlab.techbit.su
  
  # Ingress configuration
  ingress:
    configureCertmanager: false
    class: traefik
    tls:
      enabled: true
      secretName: gitlab-tls-selfsigned
  
  # Cert Manager - disabled (we use self-signed certs)
  certmanager-issuer:
    email: admin@techbit.su
  
  # Disable upgrade check hook
  gitlab:
    upgradeCheck:
      enabled: false

# Disable GitLab upgrade check
gitlab:
  upgradeCheck:
    enabled: false

# GitLab Pages - disabled
pages:
  enabled: false

# GitLab Runner - disabled (use external)
gitlab-runner:
  install: false

# Registry - enabled with simple storage
registry:
  enabled: true
  storage:
    secret: gitlab-registry-storage
    key: config
  persistence:
    enabled: true
    size: 10Gi
    storageClass: longhorn
  service:
    type: ClusterIP
    port: 5000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# PostgreSQL
postgresql:
  enabled: true
  persistence:
    enabled: true
    size: 20Gi
    storageClass: longhorn
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  shmVolume:
    enabled: true

# Redis - use install instead of enabled
redis:
  install: true
  persistence:
    enabled: true
    size: 5Gi
    storageClass: longhorn
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Gitaly
gitaly:
  persistence:
    enabled: true
    size: 30Gi
    storageClass: longhorn
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# Webservice
webservice:
  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      cpu: 1000m
      memory: 1.5Gi

# Sidekiq
sidekiq:
  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      cpu: 1000m
      memory: 1.5Gi

# Toolbox
toolbox:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Cert Manager - don't install
certmanager:
  install: false

# Use existing cert-manager issuer
certificate:
  enabled: false

# Initial root password
gitlab:
  initialRootPassword:
    secret: gitlab-initial-password
    key: password
