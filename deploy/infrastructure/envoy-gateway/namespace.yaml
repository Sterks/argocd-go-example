# Envoy Gateway Installation Manifests
# =====================================
# This directory contains the installation manifests for Envoy Gateway
# managed by ArgoCD.

# Note: The actual installation is done via Helm chart.
# This file ensures the namespace and basic configuration exists.

---
# Namespace for Envoy Gateway
apiVersion: v1
kind: Namespace
metadata:
  name: envoy-gateway-system
  labels:
    app.kubernetes.io/name: envoy-gateway
    app.kubernetes.io/component: gateway
