apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: victoriametrics
  labels:
    app: grafana
  annotations:
    # Whitelist IP адресов - только внутренняя сеть
    envoy.ingress.kubernetes.io/whitelist: |
      192.168.0.0/24
      10.42.0.0/16
    # Rate limiting (запросов в секунду на IP)
    envoy.ingress.kubernetes.io/rate-limit: "100"
    # Timeout
    envoy.ingress.kubernetes.io/timeout: "30s"
spec:
  ingressClassName: envoy
  rules:
    # Rule for IP-based access with /grafana path
    - http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: vm-stack-2-grafana
                port:
                  number: 80
