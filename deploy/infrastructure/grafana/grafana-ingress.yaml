apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: victoriametrics
  labels:
    app: grafana
  annotations:
    # Rate limiting (запросов в секунду на IP)
    envoy.ingress.kubernetes.io/rate-limit: "100"
    # Timeout
    envoy.ingress.kubernetes.io/timeout: "30s"
spec:
  ingressClassName: envoy
  rules:
    # Host-based rule for DNS access
    - host: grafana.techbit.su
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vm-stack-2-grafana
                port:
                  number: 80
    # IP-based rule for direct access
    - http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: vm-stack-2-grafana
                port:
                  number: 80
