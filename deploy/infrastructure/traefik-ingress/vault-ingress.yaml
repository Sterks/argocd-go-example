apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault-traefik-ingress
  namespace: vault
  labels:
    app: vault
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  rules:
  - host: vault.techbit.su
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vault-ui
            port:
              number: 8200
