---
# Certificate для Vault с self-signed сертификатом
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-tls
  namespace: vault
spec:
  secretName: vault-tls-selfsigned
  duration: 8760h  # 1 год
  renewBefore: 720h  # 30 дней до истечения
  commonName: vault.techbit.su
  dnsNames:
    - vault.techbit.su
  issuerRef:
    name: selfsigned-cluster-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
# Vault Ingress с TLS (self-signed)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault-ingress
  namespace: vault
  labels:
    app: vault
    app.kubernetes.io/name: vault
    app.kubernetes.io/instance: vault
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - vault.techbit.su
      secretName: vault-tls-selfsigned
  rules:
    - host: vault.techbit.su
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault-ui
                port:
                  number: 8200
