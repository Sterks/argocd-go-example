apiVersion: v1
kind: ConfigMap
metadata:
  name: pritunl-config
  namespace: pritunl
  labels:
    app: pritunl
data:
  pritunl.conf: |
    {
      "mongodb_uri": "mongodb://mongodb:27017/pritunl",
      "server_key_path": "/var/lib/pritunl/pritunl.key",
      "log_path": "/var/log/pritunl.log",
      "static_cache": true,
      "server_cert_path": "/var/lib/pritunl/pritunl.crt",
      "temp_path": "/tmp/pritunl_%r",
      "bind_addr": "0.0.0.0",
      "debug": false,
      "www_path": "/usr/share/pritunl/www",
      "local_address_interface": "auto",
      "server_port": 80,
      "server_ssl": false,
      "reverse_proxy": true
    }
