apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: bgpadvertisements.metallb.io
spec:
  group: metallb.io
  names:
    kind: BGPAdvertisement
    listKind: BGPAdvertisementList
    plural: bgpadvertisements
    singular: bgpadvertisement
  scope: Namespaced
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                ipAddressPools:
                  type: array
                  items:
                    type: string
                nodeSelectors:
                  type: array
                  items:
                    type: object
                    additionalProperties:
                      type: string
                aggregationLength:
                  type: integer
                aggregationLengths:
                  type: array
                  items:
                    type: object
                    properties:
                      addr:
                        type: string
                      length:
                        type: integer
                communities:
                  type: array
                  items:
                    type: string
                localPref:
                  type: integer
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: bgppeers.metallb.io
spec:
  group: metallb.io
  names:
    kind: BGPPeer
    listKind: BGPPeerList
    plural: bgppeers
    singular: bgppeer
  scope: Namespaced
  versions:
    - name: v1beta2
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                myASN:
                  type: integer
                peerASN:
                  type: integer
                peerAddress:
                  type: string
                peerPort:
                  type: integer
                holdTime:
                  type: string
                routerID:
                  type: string
                nodeSelectors:
                  type: array
                  items:
                    type: object
                    additionalProperties:
                      type: string
                passwordSecret:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                bfdProfile:
                  type: string
                ebgpMultiHop:
                  type: boolean
                vrfName:
                  type: string
                sourceAddress:
                  type: string
