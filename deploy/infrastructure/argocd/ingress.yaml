apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  labels:
    app: argocd
  annotations:
    # Whitelist IP адресов - только внутренняя сеть
    envoy.ingress.kubernetes.io/whitelist: |
      192.168.0.0/24
      10.42.0.0/16
    # Rate limiting (запросов в секунду на IP)
    envoy.ingress.kubernetes.io/rate-limit: "100"
    # Timeout
    envoy.ingress.kubernetes.io/timeout: "30s"
spec:
  ingressClassName: envoy
  # Default backend - works for IP-based access
  defaultBackend:
    service:
      name: argocd-server
      port:
        number: 80
  rules:
    # Catch-all rule for IP-based access (any host)
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
    # Host-based rule (optional, for DNS access)
    - host: argocd.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
