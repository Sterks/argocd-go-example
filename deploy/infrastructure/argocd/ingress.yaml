apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  labels:
    app: argocd
  annotations:
    # Только эти сети проходят на ArgoCD через Envoy Ingress.
    # С «чужого» интернета (не VPN / не LAN) запросы будут отклонены —
    # для доступа извне уберите whitelist или добавьте свои подсети.
    envoy.ingress.kubernetes.io/whitelist: |
      192.168.0.0/24
      10.42.0.0/16
    # Rate limiting (запросов в секунду на IP)
    envoy.ingress.kubernetes.io/rate-limit: "100"
    # Timeout
    envoy.ingress.kubernetes.io/timeout: "30s"
spec:
  ingressClassName: envoy
  rules:
    # Host-based rule for ArgoCD
    - host: argocd.techbit.su
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
