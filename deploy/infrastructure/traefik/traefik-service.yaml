apiVersion: v1
kind: Service
metadata:
  name: traefik
  namespace: traefik-system
  labels:
    app: traefik
spec:
  type: NodePort
  selector:
    app: traefik
  ports:
    - name: web
      port: 80
      targetPort: web
      nodePort: 30080
      protocol: TCP
    - name: websecure
      port: 443
      targetPort: websecure
      nodePort: 30444
      protocol: TCP
