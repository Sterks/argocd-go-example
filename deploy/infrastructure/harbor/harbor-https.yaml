# TLS сертификат для Harbor Registry (Self-signed через cert-manager)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: harbor-tls-letsencrypt
  namespace: harbor
spec:
  secretName: harbor-tls-letsencrypt
  duration: 2160h  # 90 дней
  renewBefore: 360h  # 15 дней до истечения
  commonName: harbor.techbit.su
  dnsNames:
    - harbor.techbit.su
    - ui.harbor.techbit.su
  issuerRef:
    name: selfsigned-cluster-issuer
    kind: ClusterIssuer
---
# Kubernetes Ingress для Harbor с Traefik annotations
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: harbor-ingress
  namespace: harbor
  labels:
    app: registry
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  rules:
  - host: harbor.techbit.su
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: registry
            port:
              number: 5000
  - host: ui.harbor.techbit.su
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: registry-ui
            port:
              number: 80
