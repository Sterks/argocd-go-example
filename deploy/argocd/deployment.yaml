apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-go-example
  namespace: argocd-go-example
  labels:
    app: argocd-go-example
spec:
  replicas: 2
  selector:
    matchLabels:
      app: argocd-go-example
  template:
    metadata:
      labels:
        app: argocd-go-example
    spec:
      containers:
        - name: app
          image: argocd-go-example:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
