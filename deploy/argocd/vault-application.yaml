apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.32.0
    helm:
      values: |
        # HashiCorp Vault Helm Chart Values
        # Режим: HA с Raft storage backend

        global:
          enabled: true

        server:
          # Включаем серверную часть
          enabled: true

          # Количество реплик для HA режима
          replicas: 3

          # Используем Raft как бэкенд хранилища
          storage:
            raft:
              enabled: true
              setNodeId: true

          # Дополнительная конфигурация через environment variable
          env:
            - name: VAULT_LOCAL_CONFIG
              value: |
                ui = true
                listener "tcp" {
                  tls_disable = 1
                  address = "[::]:8200"
                  cluster_address = "[::]:8201"
                }
                storage "raft" {
                  path = "/vault/data"
                }
                service_registration "kubernetes" {
                  namespace = "vault"
                }

          # Конфигурация readiness probe
          readinessProbe:
            enabled: true
            path: "/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200"
            initialDelaySeconds: 30
            periodSeconds: 10

          # Ingress для доступа к Vault
          ingress:
            enabled: true
            annotations:
              kubernetes.io/ingress.class: nginx
              nginx.ingress.kubernetes.io/ssl-redirect: "true"
              nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
            hosts:
              - host: vault.techbit.su
                paths: []
            tls:
              - secretName: vault-tls-selfsigned
                hosts:
                  - vault.techbit.su

          # Service для доступа к Vault
          service:
            enabled: true
            type: ClusterIP
            port: 8200

          # Persistent Volume для хранения данных Raft
          dataStorage:
            enabled: true
            size: 10Gi
            storageClass: "local-path"

          # Resources для подов Vault
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m

          # Affinity для распределения подов по нодам
          affinity: ""

          # Tolerations для подов
          tolerations: []

          # Node Selector
          nodeSelector: {}

          # Extra environment variables
          extraEnvironmentVars:
            VAULT_LOG_LEVEL: "info"

        # UI для Vault
        ui:
          enabled: true
          serviceType: ClusterIP
          servicePort: 8200
          externalPort: 8200

        # Agent injector (для автоматического внедрения секретов)
        injector:
          enabled: true
          replicas: 2
          resources:
            requests:
              memory: 256Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 250m

        # Конфигурация для CRD (Cert Manager и др.)
        crds:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
